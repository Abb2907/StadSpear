name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
          VITE_SUPABASE_PROJECT_ID: placeholder

  smoke:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    env:
      SMOKE_BASE_URL: https://stadspear.lovable.app
    steps:
      - name: Health check
        run: |
          echo "Probing $SMOKE_BASE_URL/api/public/health"
          for i in 1 2 3; do
            body=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
              --max-time 10 "$SMOKE_BASE_URL/api/public/health" || echo "000")
            echo "attempt=$i http_status=$body"
            cat /tmp/health.json || true
            echo
            if [ "$body" = "200" ]; then
              grep -q '"status":"ok"' /tmp/health.json && exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 3 attempts" >&2
          exit 1

      - name: Landing page reachable
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$SMOKE_BASE_URL/")
          echo "landing http_status=$code"
          [ "$code" = "200" ] || exit 1

      - name: Robots + sitemap
        run: |
          for path in /robots.txt /sitemap.xml; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$SMOKE_BASE_URL$path")
            echo "$path http_status=$code"
            [ "$code" = "200" ] || exit 1
          done
